# docker-compose.yml
# 로컬 개발용: PostgreSQL + Redis 인프라만 띄움
# 백엔드는 IntelliJ에서 직접 실행

services:
  postgres:
    image: postgres:16-alpine
    container_name: hirescope-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-hirescope}
      POSTGRES_USER: ${DB_USER:-hirescope}
      POSTGRES_PASSWORD: ${DB_PASSWD:-hirescope}
      TZ: Asia/Seoul
      PGTZ: Asia/Seoul
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-hirescope} -d ${DB_NAME:-hirescope}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - hirescope-net

  redis:
    image: redis:7-alpine
    container_name: hirescope-redis
    restart: unless-stopped
    command: >
      redis-server
      --appendonly yes
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - hirescope-net

volumes:
  postgres-data:
    name: hirescope-postgres-data
  redis-data:
    name: hirescope-redis-data

networks:
  hirescope-net:
    name: hirescope-net
    driver: bridge