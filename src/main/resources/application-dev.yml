spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}
    username: ${DB_USER}
    password: ${DB_PASSWD}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT}

ai-server:
  url: ${AI_SERVER}
  timeout: ${AI_SERVER_TIMEOUT:300000}  # 기본값 5분

logging:
  level:
    com.project.hirescopebackend: DEBUG
    org.hibernate.SQL: DEBUG
